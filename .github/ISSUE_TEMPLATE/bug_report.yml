name: Bug report
description: Report a reproducible problem in AegisNotify.
title: "fix(scope): "
labels:
  - bug
  - status:needs-review
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I understand this issue needs `status:approved` before a PR can be opened.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Explain the problem clearly and concisely.
      placeholder: The notification service fails when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a numbered, reproducible path.
      placeholder: |
        1. Start the service with...
        2. Send a request to...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The service should...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The service currently...
    validations:
      required: true
  - type: dropdown
    id: affected-module
    attributes:
      label: Affected module
      options:
        - aegis-notification-service
        - aegis-config-server
        - aegis-eureka-server
        - parent/build
        - CI/workflows
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Windows
        - WSL
        - macOS
        - Ubuntu
        - Debian
        - Fedora
        - Other Linux
        - Other
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: Agent / client
      options:
        - OpenCode
        - Claude Code
        - Gemini CLI
        - Cursor
        - Windsurf
        - Codex
        - Other
    validations:
      required: true
  - type: dropdown
    id: shell
    attributes:
      label: Shell
      options:
        - PowerShell
        - bash
        - zsh
        - fish
        - cmd
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste stack traces, CI links, or relevant logs.
      render: shell
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, workarounds, or related links.
    validations:
      required: false
