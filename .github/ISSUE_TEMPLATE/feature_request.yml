name: Feature request
description: Propose a new capability or improvement for AegisNotify.
title: "feat(scope): "
labels:
  - enhancement
  - status:needs-review
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I understand this issue needs `status:approved` before a PR can be opened.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: Describe the user or system pain this feature solves.
      placeholder: AegisNotify needs...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Explain the expected behavior from the user's perspective.
      placeholder: Add support for...
    validations:
      required: true
  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      options:
        - Notification service
        - Config server
        - Eureka server
        - Database/migrations
        - CI/workflows
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List what must be true for this work to be complete.
      placeholder: |
        - [ ] The service...
        - [ ] Tests cover...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe workarounds or other designs considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add diagrams, links, or examples.
    validations:
      required: false
