name: Maintenance task
description: Track repository, CI, documentation, or refactoring work.
title: "chore(scope): "
labels:
  - status:needs-review
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I understand this issue needs `status:approved` before a PR can be opened.
          required: true
  - type: dropdown
    id: task-type
    attributes:
      label: Task type
      options:
        - CI/workflows
        - Documentation
        - Build tooling
        - Refactoring
        - Repository maintenance
        - Other
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Describe the maintenance outcome we need.
      placeholder: Improve the repository by...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List files, modules, workflows, or docs expected to change.
      placeholder: |
        - `.github/...`
        - `pom.xml`
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List what must be true for this task to be complete.
      placeholder: |
        - [ ] The workflow...
        - [ ] Documentation is updated...
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Explain how reviewers can verify this task.
      placeholder: Run `./mvnw test` or inspect the changed workflow/template.
    validations:
      required: true
