server:
  port: 8080

spring:
  application:
    name: aegis-api-gateway
  config:
    import: "optional:configserver:http://localhost:8888"
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8088/realms/aegis/protocol/openid-connect/certs}
  cloud:
    gateway:
      default-filters:
        - TokenRelay=
      routes:
        - id: notification-submit
          uri: lb://aegis-notification-service
          predicates:
            - Path=/api/v1/notifications
            - Method=POST
        - id: notification-status
          uri: lb://aegis-notification-service
          predicates:
            - Path=/api/v1/notifications/*/status
            - Method=GET
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
