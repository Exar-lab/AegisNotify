server:
  port: 8082

spring:
  application:
    name: aegis-notification-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aegisnotify}
    username: ${DB_USERNAME:aegis}
    password: ${DB_PASSWORD:aegis}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8088/realms/aegis/protocol/openid-connect/certs}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

audit:
  publishing:
    enabled: true
  topic: notification-audit-events

notification:
  providers:
    email:
      base-url: ${SENDGRID_BASE_URL:https://api.sendgrid.com}
      api-key: ${SENDGRID_API_KEY:}
      from-address: ${SENDGRID_FROM_ADDRESS:noreply@aegisnotify.com}
    sms:
      base-url: ${TWILIO_BASE_URL:https://api.twilio.com}
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_SMS_FROM_NUMBER:}
    whatsapp:
      base-url: ${TWILIO_BASE_URL:https://api.twilio.com}
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_WHATSAPP_FROM_NUMBER:}
    push:
      base-url: ${FCM_BASE_URL:https://fcm.googleapis.com}
      project-id: ${FCM_PROJECT_ID:}
      access-token: ${FCM_ACCESS_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
