server:
  port: 8082

spring:
  application:
    name: aegis-notification-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aegisnotify}
    username: ${DB_USERNAME:aegis}
    password: ${DB_PASSWORD:aegis}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8088/realms/aegis/protocol/openid-connect/certs}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

audit:
  publishing:
    enabled: true
  topic: notification-audit-events

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
