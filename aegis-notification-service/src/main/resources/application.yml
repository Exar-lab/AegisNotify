server:
  port: 8082

spring:
  application:
    name: aegis-notification-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aegisnotify}
    username: ${DB_USERNAME:aegis}
    password: ${DB_PASSWORD:aegis}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
